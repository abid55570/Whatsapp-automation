name: whatsapp-saas

services:
  # ============================================
  # PostgreSQL - Main database
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: wa_postgres
    restart: unless-stopped
    environment:
      # In production, REQUIRE these env vars (no insecure default).
      # Local dev keeps the postgres default via .env file.
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB must be set in .env}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - wa_network

  # ============================================
  # Redis - Cache + Celery broker
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: wa_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - wa_network

  # ============================================
  # Backend - FastAPI
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wa_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - wa_network

  # ============================================
  # Celery Worker - Background jobs
  # ============================================
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wa_worker
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      - backend
      - redis
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4
    # Celery worker doesn't serve HTTP — disable backend-image's curl /health check
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping -d celery@$$HOSTNAME || exit 0"]
      interval: 60s
      timeout: 10s
      retries: 3
    networks:
      - wa_network

  # ============================================
  # Celery Beat - Scheduled tasks (reminders, sheet sync)
  # ============================================
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wa_beat
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      - backend
      - redis
    command: celery -A app.workers.celery_app beat --loglevel=info
    healthcheck:
      disable: true
    networks:
      - wa_network

  # ============================================
  # Frontend - Next.js PWA
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wa_frontend
    restart: unless-stopped
    # Dev: run as root so Next.js can write the /app/.next anonymous volume
    # (created root-owned; the image's `node` user otherwise hits EACCES).
    user: root
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      # Empty = same-origin. The browser calls /api/* on whatever host it
      # loaded (localhost / LAN IP / tunnel); Next rewrites that to the
      # backend below. This is what makes phone + tunnel testing work.
      NEXT_PUBLIC_API_URL: ""
      # Where Next forwards /api/* server-side (internal docker network).
      BACKEND_INTERNAL_URL: http://backend:8000
      # Bind-mount file events don't propagate from Windows host into the
      # container, so Next's dev watcher must poll to detect edits + hot-reload.
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    command: npm run dev
    networks:
      - wa_network

  # ============================================
  # Adminer - Database GUI
  # ============================================
  adminer:
    image: adminer:latest
    container_name: wa_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha-dark
    depends_on:
      - postgres
    networks:
      - wa_network

  # ============================================
  # Flower - Celery monitoring dashboard
  # ============================================
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wa_flower
    restart: unless-stopped
    ports:
      - "5555:5555"
    env_file:
      - .env
    depends_on:
      - redis
      - worker
    command: celery -A app.workers.celery_app flower --port=5555
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:5555/ || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    networks:
      - wa_network

  # ============================================
  # Cloudflare Tunnel - share a public HTTPS URL for phone testing
  # Disabled by default. Start with:
  #     docker compose --profile tunnel up -d tunnel
  # Then read the https://*.trycloudflare.com URL from:
  #     docker compose logs tunnel
  # Stop sharing with:
  #     docker compose stop tunnel
  # ============================================
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: wa_tunnel
    restart: unless-stopped
    # Points at the frontend over the internal network. The frontend
    # proxies /api/* to the backend, so this ONE tunnel serves everything.
    command: tunnel --no-autoupdate --url http://frontend:3000
    depends_on:
      - frontend
    networks:
      - wa_network
    profiles:
      - tunnel

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  wa_network:
    driver: bridge
